<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="38%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#2c2a27"/>
      <stop offset="55%" stop-color="#161513"/>
      <stop offset="100%" stop-color="#070707"/>
    </radialGradient>
    <linearGradient id="gold" x1="18%" y1="12%" x2="82%" y2="88%">
      <stop offset="0%" stop-color="#e7cf94"/>
      <stop offset="50%" stop-color="#cca869"/>
      <stop offset="100%" stop-color="#a9854f"/>
    </linearGradient>
  </defs>

  <!-- 深色圓角底 -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- 錶冠 -->
  <rect x="366" y="242" width="20" height="28" rx="6" fill="url(#gold)"/>

  <g fill="none" stroke="url(#gold)" stroke-linecap="round">
    <!-- 錶圈 -->
    <circle cx="256" cy="256" r="112" stroke-width="12"/>
    <!-- 12 / 3 / 6 / 9 時標 -->
    <line x1="256" y1="150" x2="256" y2="184" stroke-width="12"/>
    <line x1="256" y1="362" x2="256" y2="328" stroke-width="12"/>
    <line x1="150" y1="256" x2="184" y2="256" stroke-width="12"/>
    <line x1="362" y1="256" x2="328" y2="256" stroke-width="12"/>
  </g>

  <!-- 指針 -->
  <line x1="256" y1="256" x2="336" y2="208" stroke="url(#gold)" stroke-width="13" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="204" y2="212" stroke="#f2e8cf" stroke-width="14" stroke-linecap="round"/>
  <!-- 中心點 -->
  <circle cx="256" cy="256" r="11" fill="#f2e8cf"/>
</svg>
