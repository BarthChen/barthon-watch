<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>BarthON 後台登入</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:#0b0b0d;
    color:#ececee;
    font-family:"Noto Sans TC",sans-serif;
    font-weight:300;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    -webkit-font-smoothing:antialiased;
  }
  .card{
    width:100%;
    max-width:400px;
    background:#111114;
    border:1px solid rgba(255,255,255,.08);
    border-radius:16px;
    padding:48px 40px 44px;
    margin:24px;
  }
  .logo{
    font-family:"Cormorant Garamond",serif;
    font-size:30px;
    font-weight:600;
    letter-spacing:.04em;
    color:#ececee;
    text-align:center;
    margin-bottom:6px;
  }
  .logo em{ color:#c8a667;font-style:normal; }
  .sub{
    font-size:11px;
    letter-spacing:.3em;
    text-transform:uppercase;
    color:#5e5e66;
    text-align:center;
    margin-bottom:38px;
  }
  label{
    display:block;
    font-size:11px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:#7c7c84;
    margin-bottom:7px;
  }
  .field{ margin-bottom:20px; }
  input{
    width:100%;
    background:#0d0e10;
    border:1px solid rgba(255,255,255,.1);
    border-radius:8px;
    color:#ececee;
    padding:12px 14px;
    font-size:15px;
    font-family:inherit;
    transition:border-color .2s;
  }
  input:focus{ outline:none;border-color:#c8a667; }
  .btn-login{
    width:100%;
    padding:13px;
    border:0;
    border-radius:8px;
    background:#c8a667;
    color:#100d07;
    font-family:inherit;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    letter-spacing:.04em;
    transition:background .2s,transform .15s;
    margin-top:8px;
  }
  .btn-login:hover{ background:#e3c98c; }
  .btn-login:active{ transform:scale(.98); }
  .btn-login:disabled{ opacity:.5;cursor:not-allowed;transform:none; }
  .error{
    color:#e0664d;
    font-size:13px;
    text-align:center;
    margin-top:14px;
    min-height:20px;
  }
  .divider{
    height:1px;
    background:rgba(255,255,255,.06);
    margin:32px 0 24px;
  }
  .back{
    display:block;
    text-align:center;
    font-size:13px;
    color:#5e5e66;
    text-decoration:none;
    transition:color .2s;
  }
  .back:hover{ color:#c8a667; }
</style>
</head>
<body>

<div class="card">
  <div class="logo">Barth<em>ON</em></div>
  <div class="sub">後台管理 &middot; Console</div>

  <form id="loginForm" novalidate>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="admin@example.com" autocomplete="email" required>
    </div>
    <div class="field">
      <label for="pw">密碼</label>
      <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login" id="loginBtn">登入後台</button>
    <div class="error" id="errMsg"></div>
  </form>

  <div class="divider"></div>
  <a href="/" class="back">← 回到前台網站</a>
</div>

<script type="module">
import { initializeApp }        from "https://www.gstatic.com/firebasejs/11.9.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
                                  from "https://www.gstatic.com/firebasejs/11.9.0/firebase-auth.js";
import { firebaseConfig }        from "./firebase-config.js";

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Already logged in? Go straight to console.
onAuthStateChanged(auth, user => {
  if (user) window.location.replace("/console");
});

const form    = document.getElementById("loginForm");
const btn     = document.getElementById("loginBtn");
const errMsg  = document.getElementById("errMsg");

form.addEventListener("submit", async e => {
  e.preventDefault();
  errMsg.textContent = "";
  const email = document.getElementById("email").value.trim();
  const pw    = document.getElementById("pw").value;
  if (!email || !pw) { errMsg.textContent = "請輸入 Email 與密碼"; return; }

  btn.disabled    = true;
  btn.textContent = "登入中…";
  try {
    await signInWithEmailAndPassword(auth, email, pw);
    // onAuthStateChanged will redirect to /console
  } catch (err) {
    const msgs = {
      "auth/invalid-credential":  "帳號或密碼錯誤",
      "auth/user-not-found":      "查無此帳號",
      "auth/wrong-password":      "密碼錯誤",
      "auth/too-many-requests":   "登入嘗試過多，請稍後再試",
    };
    errMsg.textContent = msgs[err.code] || "登入失敗，請再試一次";
    btn.disabled    = false;
    btn.textContent = "登入後台";
  }
});
</script>

</body>
</html>
