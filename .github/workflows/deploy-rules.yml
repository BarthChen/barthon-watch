name: 🔒 Deploy Firestore & Storage Rules

# 只在 firestore.rules / storage.rules 變動時觸發,部署 Firestore + Storage 安全規則。
# 與 Hosting 部署分開,規則部署失敗不會影響網站上線。已於 2026-06-26 啟用並驗證可用。
#
# CI 服務帳號 firebase-adminsdk-fbsvc@barthon-watch.iam.gserviceaccount.com
# 已在 GCP IAM 取得 Firebase Admin + Service Usage Consumer 角色(部署規則所需)。
# 備援:可改用 Firebase Console 手動貼規則(Firestore 資料庫選 barthon)。

on:
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
      - 'storage.rules'
  workflow_dispatch:

jobs:
  rules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy rules
        uses: w9jds/firebase-action@v13.20.1
        with:
          args: deploy --only firestore:rules,storage
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PROJECT_ID: barthon-watch
