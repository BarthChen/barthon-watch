name: 🔒 Deploy Firestore & Storage Rules

# 只在規則檔(或 firebase.json)變動時觸發,部署 Firestore + Storage 安全規則。
# 與 Hosting 部署分開,規則部署失敗不會影響網站上線。
#
# ⚠️ 啟用前提:CI 用的服務帳號
#   firebase-adminsdk-fbsvc@barthon-watch.iam.gserviceaccount.com
# 需要在 Google Cloud IAM 加上兩個角色(一次性):
#   1) Firebase Rules Admin          (roles/firebaserules.admin)
#   2) Service Usage Consumer        (roles/serviceusage.serviceUsageConsumer)
# 未授權前此工作流程會失敗(403);可改用 Firebase Console 手動貼規則。

on:
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
      - 'storage.rules'
  workflow_dispatch:

jobs:
  rules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy rules
        uses: w9jds/firebase-action@v13.20.1
        with:
          args: deploy --only firestore:rules,storage
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PROJECT_ID: barthon-watch
