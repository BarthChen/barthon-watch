name: 🚀 Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$SA_JSON" > /tmp/gcp-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-sa.json
          npx firebase-tools@latest deploy --only hosting --project barthon-watch --non-interactive
          rm -f /tmp/gcp-sa.json
