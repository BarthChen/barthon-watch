name: 🚀 Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > /tmp/sa.json
          npx firebase-tools@latest deploy --only hosting --project barthon-watch --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
